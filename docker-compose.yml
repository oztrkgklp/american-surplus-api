services:
  mysql:
    image: mysql:8.0
    container_name: american-surplus-mysql
    restart: always
    environment:
      MYSQL_DATABASE: americansurplus
      MYSQL_ROOT_PASSWORD: american_surplus_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
      timeout: 5s

  redis:
    image: redis:7-alpine
    container_name: american-surplus-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly no --save "" --stop-writes-on-bgsave-error no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      timeout: 5s

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: american-surplus-elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      retries: 10
      timeout: 10s

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.3
    container_name: american-surplus-logstash
    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - LS_JAVA_OPTS=-Xms256m -Xmx256m
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5044:5044"
      - "5000:5000/tcp"
      - "5000:5000/udp"
      - "9600:9600"
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./docker/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600 >/dev/null || exit 1"]
      interval: 15s
      retries: 10
      timeout: 10s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: american-surplus-kibana
    restart: always
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      XPACK_SECURITY_ENABLED: "false"
    ports:
      - "5601:5601"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status >/dev/null || exit 1"]
      interval: 15s
      retries: 10
      timeout: 10s

  cdn:
    image: nginx:1.27-alpine
    container_name: american-surplus-cdn
    restart: always
    ports:
      - "8088:80"
    volumes:
      - cdn_data:/usr/share/nginx/html
      - ./docker/nginx/cdn.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/cdn-ui:/opt/cdn-ui:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 10s
      retries: 5
      timeout: 5s

volumes:
  mysql_data:
  redis_data:
  es_data:
  cdn_data: