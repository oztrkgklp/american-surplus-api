name: Docker Image - Manual creation

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag for the Docker image'
        required: true
        type: string
      acr:
        require: true
        description: 'Select container registry'
        type: choice
        options:
          - "devskynetacr(Dev)"
          - "skynetacr(Prod)"

permissions:
  id-token: write
  contents: read

jobs:
  image-create:
    runs-on: ubuntu-latest
    environment: production
    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create variable
      run: |
        REPO_NAME=${GITHUB_REPOSITORY##*/}
        REPO_TAG=${{ inputs.tag }}

        if [ "${{ inputs.acr }}" = "devskynetacr(Dev)" ]; then
          ACR_NAME="devskynetacr"
          ENVIRONMENT="development"
        elif [ "${{ inputs.acr }}" = "skynetacr(Prod)" ]; then
          ACR_NAME="skynetacr"
          ENVIRONMENT="production"
        fi

        REPO_FULL_PATH="${ACR_NAME}.azurecr.io/${REPO_NAME}:${REPO_TAG}"

        echo "ENVIRONMENT=$ENVIRONMENT" >> $GITHUB_ENV
        echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
        echo "REPO_FULL_PATH=$REPO_FULL_PATH" >> $GITHUB_ENV

    - name: Azure Authentication
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    
    - name: Log in to ACR
      run: | 
        az acr login --name $ACR_NAME


    - name: Docker Build
      run: | 
        docker build --build-arg ENVIRONMENT=$ENVIRONMENT . -t $REPO_FULL_PATH

    - name: Push iamge
      run: | 
        docker push $REPO_FULL_PATH